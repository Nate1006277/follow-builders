name: Daily Digest

on:
  schedule:
    # Run at 01:00 UTC every day = 09:00 Beijing Time
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate & send digest
        run: cd scripts && node daily-digest-cloud.mjs
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
